<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Task Management App</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
    <!-- COMMENTSSSS -->
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="app-title">
                    <span class="icon">📋</span>
                    TaskFlow
                </h1>
                <p class="app-subtitle">Streamline your productivity</p>
            </div>
        </header>

        <main class="main">
            <div class="task-input-section">
                <div class="input-container">
                    <input type="text" id="taskInput" placeholder="Enter your task here..." class="task-input">
                    <button id="addTaskBtn" class="add-btn">
                        <span class="add-icon">+</span>
                        Add Task
                    </button>
                </div>
            </div>

            <!-- Search & Filter Section -->
            <div class="search-filter-section">
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" placeholder="Search tasks..." class="search-input">
                        <button id="clearSearch" class="clear-search" title="Clear search">✕</button>
                    </div>
                </div>

                <div class="filter-container">
                    <div class="filter-section">
                        <h3>Quick Filters:</h3>
                        <div class="quick-filters">
                            <button class="filter-btn active" data-filter="all">
                                <span class="filter-icon">📋</span>
                                All Tasks
                            </button>
                            <button class="filter-btn" data-filter="completed">
                                <span class="filter-icon">✅</span>
                                Completed
                            </button>
                            <button class="filter-btn" data-filter="pending">
                                <span class="filter-icon">⏳</span>
                                Pending
                            </button>
                            <button class="filter-btn" data-filter="recent">
                                <span class="filter-icon">🆕</span>
                                Recent
                            </button>
                        </div>
                    </div>

                    <div class="advanced-filters">
                        <button id="toggleAdvanced" class="toggle-advanced">
                            <span>Advanced Options</span>
                            <span class="toggle-icon">▼</span>
                        </button>
                        <div id="advancedPanel" class="advanced-panel">
                            <div class="filter-group">
                                <label>Sort by:</label>
                                <select id="sortSelect" class="sort-select">
                                    <option value="created-desc">Newest First</option>
                                    <option value="created-asc">Oldest First</option>
                                    <option value="alphabetical">Alphabetical</option>
                                    <option value="completion">Completion Status</option>
                                </select>
                            </div>
                            <div class="filter-actions">
                                <button id="clearAllFilters" class="clear-filters-btn">Clear All Filters</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tasks-section">
                <div class="tasks-header">
                    <h2>Your Tasks</h2>
                    <span id="taskCount" class="task-count">0 tasks</span>
                </div>
                <div id="tasksList" class="tasks-list">
                    <!-- Tasks will be dynamically added here -->
                </div>
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">✨</div>
                    <h3>No tasks yet</h3>
                    <p>Add your first task above to get started!</p>
                </div>
            </div>

            <div class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-number" id="totalTasks">0</span>
                        <span class="stat-label">Total Tasks</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="completedTasks">0</span>
                        <span class="stat-label">Completed</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="pendingTasks">0</span>
                        <span class="stat-label">Pending</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 TaskFlow. Built with HTML, CSS, and JavaScript.</p>
        </footer>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
